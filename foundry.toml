[profile.default]
src = "src"
out = "out"
libs = ["lib"]
no_match_coverage = "src/mock/|test/|script/"
optimizer = true
optimizer_runs = 200
via_ir = true
# For doing bytecode comparisons without the metadata hash at the end, uncomment this line:
# bytecode_hash = "none"

[rpc_endpoints]
base_mainnet = "${RPC_BASE_MAINNET}"
base_sepolia = "${RPC_BASE_SEPOLIA}"
eth_mainnet = "${RPC_ETH_MAINNET}"
eth_sepolia = "${RPC_ETH_SEPOLIA}"

[etherscan]
# https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#etherscan-api-key-settings
# also has optional url attribute
base_mainnet = { key = "${BASESCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}" }
eth_mainnet = { key = "${ETHERSCAN_API_KEY}" }
eth_sepolia = { key = "${ETHERSCAN_API_KEY}" }

[fmt]
line_length = 120
tab_width = 2

[invariant]
runs = 5            # default 256
depth = 1000        # default 500
show_metrics = true

[lint]
exclude_lints = [
  "mixed-case-function",
  "mixed-case-variable",
  "screaming-snake-case-immutable",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
